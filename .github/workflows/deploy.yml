name: Deploy to VPS

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Stop app on VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            taskkill /F /IM node.exe & exit 0

      - name: Clean old dist on VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            if exist "D:\MDF WEBSITE\Website\dist\web.config" copy /Y "D:\MDF WEBSITE\Website\dist\web.config" "D:\MDF WEBSITE\web.config.bak"
            if exist "D:\MDF WEBSITE\Website\dist" rmdir /S /Q "D:\MDF WEBSITE\Website\dist"

      - name: Deploy dist to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          source: "dist/"
          target: 'D:/MDF WEBSITE/Website'

      - name: Restore web.config and start app on VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            if exist "D:\MDF WEBSITE\web.config.bak" copy /Y "D:\MDF WEBSITE\web.config.bak" "D:\MDF WEBSITE\Website\dist\web.config"
            cd /d "D:\MDF WEBSITE\Website" && start /B node dist\index.cjs > "D:\MDF WEBSITE\Website\app.log" 2>&1
